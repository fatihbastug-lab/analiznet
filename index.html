<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalite Operasyon Dashboard v4</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-[#f0f2f5] font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [sheets, setSheets] = useState({});
            const [activeSheet, setActiveSheet] = useState("");
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const handleFile = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const wb = XLSX.read(evt.target.result, { type: 'binary' });
                    const allData = {};
                    wb.SheetNames.forEach(name => {
                        const data = XLSX.utils.sheet_to_json(wb.Sheets[name]);
                        if(data.length > 0) allData[name] = data;
                    });
                    setSheets(allData);
                    setActiveSheet(Object.keys(allData)[0]);
                };
                reader.readAsBinaryString(file);
            };

            useEffect(() => {
                if (activeSheet && sheets[activeSheet]) {
                    renderChart();
                }
            }, [activeSheet, sheets]);

            const renderChart = () => {
                const data = sheets[activeSheet];
                const keys = Object.keys(data[0]);

                // Sayısal verilerin olduğu sütunları ve metin (etiket) sütununu bul
                const labelKey = keys.find(k => isNaN(data[0][k])) || keys[0];
                const numericKeys = keys.filter(k => !isNaN(parseFloat(data[0][k])) && typeof data[0][k] !== 'string');
                
                // Eğer sayısal veri bulunamazsa string içindeki sayıları zorla
                const targetKey = numericKeys.length > 0 ? numericKeys[0] : keys.find(k => !isNaN(parseFloat(data[0][k])));

                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');

                chartInstance.current = new Chart(ctx, {
                    type: activeSheet.toLowerCase().includes('trend') ? 'line' : 'bar',
                    data: {
                        labels: data.slice(0, 30).map(d => d[labelKey]),
                        datasets: [{
                            label: targetKey,
                            data: data.slice(0, 30).map(d => parseFloat(d[targetKey]) || 0),
                            backgroundColor: 'rgba(79, 70, 229, 0.6)',
                            borderColor: '#4f46e5',
                            borderWidth: 2,
                            tension: 0.3,
                            fill: true
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: true, position: 'top' } },
                        scales: { y: { beginAtZero: true } }
                    }
                });
            };

            return (
                <div className="min-h-screen p-4">
                    <div className="max-w-[1400px] mx-auto">
                        {/* Üst Panel */}
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row justify-between items-center">
                            <div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tighter uppercase">Operasyon Analiz Sistemi</h1>
                                <p className="text-slate-500 text-sm italic">Yüklenen Sekme: <span className="text-indigo-600 font-bold">{activeSheet || 'Bekleniyor...'}</span></p>
                            </div>
                            <div className="mt-4 md:mt-0">
                                <label className="bg-indigo-600 text-white px-8 py-3 rounded-full font-bold cursor-pointer hover:bg-indigo-700 transition shadow-lg shadow-indigo-200 inline-block">
                                    Excel/CSV Yükle
                                    <input type="file" onChange={handleFile} hidden accept=".xlsx, .xls, .csv" />
                                </label>
                            </div>
                        </div>

                        {activeSheet ? (
                            <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                                {/* Sol Menü (Sekmeler) */}
                                <div className="lg:col-span-1 space-y-2">
                                    <h3 className="text-xs font-bold text-slate-400 uppercase ml-2 mb-2">Veri Setleri</h3>
                                    {Object.keys(sheets).map(name => (
                                        <button 
                                            key={name}
                                            onClick={() => setActiveSheet(name)}
                                            className={`w-full text-left px-4 py-3 rounded-2xl text-sm font-semibold transition-all ${activeSheet === name ? 'bg-white text-indigo-600 shadow-sm border-l-4 border-indigo-600' : 'text-slate-500 hover:bg-white'}`}
                                        >
                                            {name}
                                        </button>
                                    ))}
                                </div>

                                {/* Sağ İçerik (Grafik ve Tablo) */}
                                <div className="lg:col-span-3 space-y-6">
                                    {/* Ana Grafik */}
                                    <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 min-h-[500px]">
                                        <div className="h-[400px]">
                                            <canvas ref={chartRef}></canvas>
                                        </div>
                                    </div>

                                    {/* Alt Veri Özeti */}
                                    <div className="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                                        <div className="p-6 border-b border-slate-50 flex justify-between items-center">
                                            <h4 className="font-bold text-slate-800">Veri Tablosu (İlk 50 Satır)</h4>
                                            <span className="bg-slate-100 px-3 py-1 rounded-full text-xs text-slate-500 font-bold">Toplam: {sheets[activeSheet].length} Kayıt</span>
                                        </div>
                                        <div className="overflow-x-auto max-h-[400px]">
                                            <table className="w-full text-left text-sm">
                                                <thead className="bg-slate-50 sticky top-0">
                                                    <tr>
                                                        {Object.keys(sheets[activeSheet][0]).map(k => (
                                                            <th key={k} className="px-6 py-4 text-slate-400 font-bold uppercase text-[10px]">{k}</th>
                                                        ))}
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {sheets[activeSheet].slice(0, 50).map((row, i) => (
                                                        <tr key={i} className="border-b border-slate-50 hover:bg-indigo-50/30 transition">
                                                            {Object.values(row).map((v, j) => (
                                                                <td key={j} className="px-6 py-3 text-slate-600 font-medium">{v}</td>
                                                            ))}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white rounded-[3rem] p-20 text-center shadow-sm border border-slate-200">
                                <div className="w-24 h-24 bg-indigo-50 text-indigo-500 rounded-full flex items-center justify-center mx-auto mb-6 text-4xl">📊</div>
                                <h2 className="text-2xl font-black text-slate-800">Analize Hazır</h2>
                                <p className="text-slate-400 mt-2 max-w-sm mx-auto">Lütfen "kalite_operasyon_dashboard" dosyanızı yükleyerek sekmeler arası analize başlayın.</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
