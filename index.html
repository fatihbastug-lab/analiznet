<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalite Operasyon Dashboard Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [sheets, setSheets] = useState({});
            const [activeSheet, setActiveSheet] = useState("");
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            const handleFile = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const wb = XLSX.read(evt.target.result, { type: 'binary' });
                        const allData = {};
                        wb.SheetNames.forEach(name => {
                            const data = XLSX.utils.sheet_to_json(wb.Sheets[name]);
                            if(data.length > 0) allData[name] = data;
                        });
                        setSheets(allData);
                        setActiveSheet(Object.keys(allData)[0]);
                    } catch (err) {
                        alert("Dosya okunurken hata oluştu: " + err.message);
                    }
                };
                reader.readAsBinaryString(file);
            };

            useEffect(() => {
                renderChart();
            }, [activeSheet, sheets]);

            const renderChart = () => {
                if (!activeSheet || !sheets[activeSheet] || !chartRef.current) return;

                const data = sheets[activeSheet];
                const keys = Object.keys(data[0]);
                
                // Sayısal olan ilk sütunu bulalım
                const numericKey = keys.find(key => typeof data[0][key] === 'number') || keys[1];
                const labelKey = keys[0];

                const labels = data.slice(0, 20).map(d => String(d[labelKey] || ''));
                const values = data.slice(0, 20).map(d => parseFloat(d[numericKey]) || 0);

                if (chartInstance.current) chartInstance.current.destroy();

                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [{
                            label: `${activeSheet} Verileri (${numericKey})`,
                            data: values,
                            backgroundColor: 'rgba(79, 70, 229, 0.7)',
                            borderColor: '#4f46e5',
                            borderWidth: 1,
                            borderRadius: 5
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: true } }
                    }
                });
            };

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-7xl mx-auto">
                    <div className="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
                        {/* Header */}
                        <div className="bg-indigo-900 p-8 text-white flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h1 className="text-3xl font-black tracking-tight">WOW DASHBOARD</h1>
                                <p className="text-indigo-200 opacity-80">Operasyonel Kalite ve Performans Analizi</p>
                            </div>
                            <label className="bg-white text-indigo-900 px-6 py-3 rounded-2xl font-bold cursor-pointer hover:bg-indigo-50 transition-all shadow-lg">
                                📁 Excel Yükle
                                <input type="file" onChange={handleFile} hidden accept=".xlsx, .xls, .csv" />
                            </label>
                        </div>

                        {activeSheet ? (
                            <div className="p-6">
                                {/* Sekmeler */}
                                <div className="flex flex-wrap gap-2 mb-8 border-b border-slate-100 pb-4">
                                    {Object.keys(sheets).map(name => (
                                        <button 
                                            key={name}
                                            onClick={() => setActiveSheet(name)}
                                            className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${activeSheet === name ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                                        >
                                            {name}
                                        </button>
                                    ))}
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    {/* Ana Grafik */}
                                    <div className="lg:col-span-2 bg-slate-50 p-6 rounded-2xl border border-slate-100 min-h-[450px]">
                                        <canvas ref={chartRef}></canvas>
                                    </div>

                                    {/* Veri Detay ve Özet */}
                                    <div className="space-y-6">
                                        <div className="bg-indigo-50 p-6 rounded-2xl border border-indigo-100">
                                            <h4 className="text-indigo-900 font-bold mb-2 uppercase text-xs tracking-widest">Sekme Özeti</h4>
                                            <div className="flex justify-between items-end">
                                                <span className="text-slate-600 text-sm">Toplam Satır:</span>
                                                <span className="text-2xl font-black text-indigo-700">{sheets[activeSheet].length}</span>
                                            </div>
                                        </div>

                                        <div className="bg-white p-4 rounded-2xl border border-slate-200 max-h-[300px] overflow-auto shadow-inner">
                                            <table className="w-full text-[10px]">
                                                <thead className="sticky top-0 bg-white">
                                                    <tr className="text-slate-400 uppercase border-b border-slate-100 text-left">
                                                        <th className="pb-2 font-bold">{Object.keys(sheets[activeSheet][0])[0]}</th>
                                                        <th className="pb-2 font-bold">Değer</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="text-slate-700">
                                                    {sheets[activeSheet].map((row, i) => (
                                                        <tr key={i} className="border-b border-slate-50">
                                                            <td className="py-2 truncate max-w-[100px]">{String(Object.values(row)[0])}</td>
                                                            <td className="py-2 font-mono font-bold text-indigo-600">{String(Object.values(row).find(v => typeof v === 'number') || '-')}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="py-32 text-center">
                                <div className="text-8xl mb-6">📂</div>
                                <h2 className="text-2xl font-bold text-slate-800">Analiz Dosyasını Bekliyor</h2>
                                <p className="text-slate-400 max-w-sm mx-auto mt-2">Lütfen analiz etmek istediğiniz kalite operasyon Excel dosyasını yukarıdaki butona tıklayarak seçin.</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
