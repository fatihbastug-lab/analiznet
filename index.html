<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalite Operasyon Dashboard Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        function App() {
            const [sheets, setSheets] = useState({});
            const [activeSheet, setActiveSheet] = useState("");

            const handleFile = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const wb = XLSX.read(evt.target.result, { type: 'binary' });
                    const allData = {};
                    wb.SheetNames.forEach(name => {
                        allData[name] = XLSX.utils.sheet_to_json(wb.Sheets[name]);
                    });
                    setSheets(allData);
                    setActiveSheet(wb.SheetNames[0]);
                };
                reader.readAsBinaryString(file);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    {/* Üst Bar */}
                    <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8 gap-4">
                        <div>
                            <h1 className="text-2xl font-black text-indigo-900 tracking-tighter">OPERASYONEL ANALİZ 2026</h1>
                            <p className="text-slate-500 text-sm font-medium">Kalite, Trend ve Performans Takibi</p>
                        </div>
                        <input type="file" onChange={handleFile} className="text-sm file:bg-indigo-600 file:text-white file:border-0 file:px-4 file:py-2 file:rounded-lg file:font-bold cursor-pointer hover:file:bg-indigo-700 transition-all" />
                    </div>

                    {activeSheet ? (
                        <div className="max-w-7xl mx-auto">
                            {/* Sekme Navigasyonu */}
                            <div className="flex flex-wrap gap-2 mb-6">
                                {Object.keys(sheets).map(name => (
                                    <button 
                                        key={name}
                                        onClick={() => setActiveSheet(name)}
                                        className={`px-4 py-2 rounded-full text-xs font-bold uppercase transition-all ${activeSheet === name ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-100'}`}
                                    >
                                        {name}
                                    </button>
                                ))}
                            </div>

                            {/* Dashboard İçeriği */}
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                {/* Veri Özeti Kartları */}
                                <div className="lg:col-span-3 grid grid-cols-1 md:grid-cols-4 gap-4">
                                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                                        <p className="text-xs font-bold text-slate-400 uppercase">Toplam Kayıt</p>
                                        <p className="text-3xl font-black text-slate-800">{sheets[activeSheet].length}</p>
                                    </div>
                                    {/* Dinamik Olarak İlk İki Sütun Ortalamasını Gösterelim */}
                                    <MetricCards data={sheets[activeSheet]} />
                                </div>

                                {/* Grafik Alanı */}
                                <div className="lg:col-span-2 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm min-h-[400px]">
                                    <h3 className="font-bold text-slate-700 mb-4">{activeSheet} - Dağılım Grafiği</h3>
                                    <ChartContainer data={sheets[activeSheet]} label={activeSheet} />
                                </div>

                                {/* Veri Tablosu Önizleme */}
                                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm overflow-auto max-h-[400px]">
                                    <h3 className="font-bold text-slate-700 mb-4 text-sm uppercase">Hızlı Veri Gözat</h3>
                                    <table className="w-full text-left text-xs">
                                        <thead>
                                            <tr className="border-b border-slate-100 italic">
                                                {Object.keys(sheets[activeSheet][0] || {}).slice(0, 3).map(h => <th key={h} className="py-2">{h}</th>)}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {sheets[activeSheet].slice(0, 10).map((row, i) => (
                                                <tr key={i} className="border-b border-slate-50 hover:bg-slate-50">
                                                    {Object.values(row).slice(0, 3).map((v, j) => <td key={j} className="py-2">{v}</td>)}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="max-w-md mx-auto mt-20 text-center bg-white p-12 rounded-[3rem] shadow-xl border border-slate-100">
                            <div className="text-6xl mb-4">📊</div>
                            <h2 className="text-xl font-bold text-slate-800">Veri Bekleniyor</h2>
                            <p className="text-slate-500 mt-2">Kalite Analiz Dashboard'u oluşturmak için operasyonel Excel dosyanızı yükleyin.</p>
                        </div>
                    )}
                </div>
            );
        }

        // Dinamik Grafik Bileşeni
        function ChartContainer({ data, label }) {
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = canvasRef.current.getContext('2d');
                
                const keys = Object.keys(data[0] || {});
                const labels = data.slice(0, 15).map((d, i) => d[keys[0]] || i);
                const values = data.slice(0, 15).map(d => parseFloat(d[keys[1]]) || 0);

                chartInstance.current = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels,
                        datasets: [{
                            label: 'Performans/Hata Değeri',
                            data: values,
                            backgroundColor: '#4f46e5',
                            borderRadius: 8
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            }, [data]);

            return <div className="h-full"><canvas ref={canvasRef}></canvas></div>;
        }

        function MetricCards({ data }) {
            const keys = Object.keys(data[0] || {});
            const avg = (data.reduce((acc, curr) => acc + (parseFloat(curr[keys[1]]) || 0), 0) / data.length).toFixed(2);
            return (
                <React.Fragment>
                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                        <p className="text-xs font-bold text-slate-400 uppercase">Ortalama Skor</p>
                        <p className="text-3xl font-black text-green-600">%{isNaN(avg) ? 0 : avg}</p>
                    </div>
                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                        <p className="text-xs font-bold text-slate-400 uppercase">Aktif Parametre</p>
                        <p className="text-3xl font-black text-indigo-600">{keys.length}</p>
                    </div>
                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                        <p className="text-xs font-bold text-slate-400 uppercase">Durum</p>
                        <p className="text-3xl font-black text-amber-500">Stabil</p>
                    </div>
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
