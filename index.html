<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Kalite Analiz Pro - GitHub Edition</title>
    
    <!-- Gerekli Kütüphaneler (CDN üzerinden) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        .chart-container { position: relative; height: 400px; width: 100%; }
        body { background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        function App() {
            const [data, setData] = useState([]);
            const [headers, setHeaders] = useState([]);
            const [selectedCol, setSelectedCol] = useState("");
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            // 1. DOSYA OKUMA MOTORU (Excel & CSV)
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (evt) => {
                    const workbook = XLSX.read(evt.target.result, { type: 'binary' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet);
                    
                    if (jsonData.length > 0) {
                        setData(jsonData);
                        const cols = Object.keys(jsonData[0]);
                        setHeaders(cols);
                        setSelectedCol(cols[0]);
                    }
                };
                reader.readAsBinaryString(file);
            };

            // 2. İSTATİSTİKSEL HESAPLAMA (Sigma Motoru)
            const stats = useMemo(() => {
                if (!data.length || !selectedCol) return null;
                
                const values = data.map(d => parseFloat(d[selectedCol])).filter(v => !isNaN(v));
                const n = values.length;
                if (n === 0) return null;

                const mean = values.reduce((a, b) => a + b, 0) / n;
                const stdDev = Math.sqrt(values.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / n);
                
                return {
                    values, n, mean, stdDev,
                    ucl: mean + (3 * stdDev), // Üst Kontrol Limiti
                    lcl: mean - (3 * stdDev)  // Alt Kontrol Limiti
                };
            }, [data, selectedCol]);

            // 3. GRAFİK RENDERER
            useEffect(() => {
                if (stats && chartRef.current) {
                    if (chartInstance.current) chartInstance.current.destroy();
                    
                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: stats.values.map((_, i) => i + 1),
                            datasets: [
                                { label: 'Ölçüm', data: stats.values, borderColor: '#3b82f6', tension: 0.2, pointRadius: 4 },
                                { label: 'UCL (3σ)', data: Array(stats.n).fill(stats.ucl), borderColor: '#ef4444', borderDash: [5, 5], pointRadius: 0 },
                                { label: 'Ortalama', data: Array(stats.n).fill(stats.mean), borderColor: '#10b981', pointRadius: 0 },
                                { label: 'LCL (3σ)', data: Array(stats.n).fill(stats.lcl), borderColor: '#ef4444', borderDash: [5, 5], pointRadius: 0 }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { position: 'top' } }
                        }
                    });
                }
            }, [stats]);

            return (
                <div className="container mx-auto px-4 py-8 max-w-5xl">
                    <header className="bg-white rounded-2xl shadow-sm p-6 mb-8 border border-slate-200">
                        <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h1 className="text-3xl font-extrabold text-slate-800 tracking-tight">Ultra Analiz Pro</h1>
                                <p className="text-slate-500 font-medium">Kalite Kontrol & İstatistiksel Dashboard</p>
                            </div>
                            <input 
                                type="file" 
                                onChange={handleFileUpload} 
                                accept=".xlsx, .xls, .csv"
                                className="text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"
                            />
                        </div>
                    </header>

                    {data.length > 0 ? (
                        <div className="space-y-6">
                            {/* İstatistik Kartları */}
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                                <Card label="Veri Adedi" value={stats?.n} color="blue" />
                                <Card label="Ortalama" value={stats?.mean.toFixed(4)} color="green" />
                                <Card label="UCL (+3σ)" value={stats?.ucl.toFixed(4)} color="red" />
                                <Card label="LCL (-3σ)" value={stats?.lcl.toFixed(4)} color="red" />
                            </div>

                            {/* Grafik Alanı */}
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-lg font-bold text-slate-700 italic">X-Bar Kontrol Grafiği</h2>
                                    <select 
                                        className="bg-slate-50 border border-slate-300 text-sm rounded-lg p-2 outline-none focus:ring-2 focus:ring-blue-500"
                                        value={selectedCol}
                                        onChange={(e) => setSelectedCol(e.target.value)}
                                    >
                                        {headers.map(h => <option key={h} value={h}>{h}</option>)}
                                    </select>
                                </div>
                                <div className="chart-container">
                                    <canvas ref={chartRef}></canvas>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-slate-300">
                            <p className="text-slate-400 text-lg">Başlamak için Excel dosyanızı yükleyin.</p>
                        </div>
                    )}
                </div>
            );
        }

        function Card({ label, value, color }) {
            const styles = {
                blue: "bg-blue-50 border-blue-200 text-blue-700",
                green: "bg-green-50 border-green-200 text-green-700",
                red: "bg-red-50 border-red-200 text-red-700"
            };
            return (
                <div className={`p-5 rounded-2xl border ${styles[color]}`}>
                    <p className="text-xs font-bold uppercase tracking-widest opacity-70">{label}</p>
                    <p className="text-2xl font-black mt-1">{value}</p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
